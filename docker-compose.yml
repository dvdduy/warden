services:
  control-plane:
    build:
      context: .
      dockerfile: src/Warden.ControlPlane.Api/Dockerfile
    container_name: warden-control-plane
    environment:
      WARDEN_DB: Host=postgres;Port=5432;Database=warden;Username=warden;Password=warden
      Warden__SeedBitLockerPolicy: "true"
    ports:
      - "5000:8080"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: warden-postgres
    environment:
      POSTGRES_DB: warden
      POSTGRES_USER: warden
      POSTGRES_PASSWORD: warden
    ports:
      - "5432:5432"
    volumes:
      - warden-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U warden -d warden"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  warden-postgres-data:
